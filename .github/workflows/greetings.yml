name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Сообщение для пользователей, осуществиших первое сообщение о проблеме в репозитории"
        pr-message: "Сообщение для пользователей, совершивших свой первый пул реквест в репозитории"
